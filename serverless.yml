# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: minhtri1612
# "service" is the name of this project. This will also be added to your AWS resource names.
service: categoryService

provider:
  name: aws
  runtime: nodejs22.x
  region: ap-southeast-2
  environment:
    BUCKET_NAME: category-image-ads-minhtri1612
    TABLE_NAME: Category
  iam:
    role:
      name: categoryService-service-role
      statements:
        - Effect: Allow
          Action: s3:PutObject
          Resource: arn:aws:s3:::category-image-ads-minhtri1612/*
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:UpdateItem
          Resource: arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.TABLE_NAME}

resources:
  Resources:
    CategoryImageBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: category-image-ads-minhtri1612
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
    CategoryTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: Category
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: fileName
            AttributeType: S
        KeySchema:
          - AttributeName: fileName
            KeyType: HASH

functions:
  getUploadUrl:
    handler: handlers/getUploadUrl.getUploadUrl
    events:
      - httpApi:
          path: /upload-url
          method: post

  updateCategoryImage:
    handler: handlers/updateCategoryImage.updateCategoryImage
    events:
      - s3:
          bucket: ${self:provider.environment.BUCKET_NAME}
          event: s3:ObjectCreated:*
          existing: true